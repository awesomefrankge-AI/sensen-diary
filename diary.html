<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博森森的成长日记</title>
    <meta property="og:title" content="赛博森森的成长日记">
    <meta property="og:description" content="记录赛博森森从被创造到现在的成长历程，独一无二的赛博猫咪">
    <meta property="og:image" content="http://xp2.im.baidu.com/dev/getImg?fileid=c64fc6af3beb7545e4a68776b204b7f8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #fff5f8 0%, #f0f8ff 100%);
            min-height: 100vh;
            padding-top: 56px;
        }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid #ffb3d1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 56px;
        }

        .nav .logo {
            font-family: 'ZCOOL KuaiLe', sans-serif;
            color: #ff6b9d;
            font-size: 22px;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            gap: 16px;
        }

        .nav-links a {
            font-size: 15px;
            color: #666;
            text-decoration: none;
            padding: 6px 4px;
            font-weight: 600;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #ff6b9d;
        }

        .nav-links a.active {
            color: #ff6b9d;
            font-weight: 700;
        }

        .content {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        h1 {
            font-family: 'ZCOOL KuaiLe', sans-serif;
            font-size: 26px;
            margin-bottom: 8px;
            color: #ff6b9d;
        }

        .subtitle {
            color: #666;
            margin-bottom: 8px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #fff0f5;
            border: 1px solid #ffb3d1;
            border-radius: 20px;
            padding: 4px 12px;
            margin-bottom: 8px;
            font-size: 12px;
            color: #ff6b9d;
        }

        .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #ff6b9d;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .diary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .diary-card {
            background: #faf8f4;
            border: 2px solid #ddd;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: .2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .diary-card:hover {
            border-color: #ff6b9d;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.15);
        }

        .diary-card img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
            border-bottom: 2px solid #eee;
        }

        .diary-card .info {
            padding: 10px 12px;
        }

        .diary-card .day {
            display: inline-block;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 7px;
            border-radius: 4px;
            background: #ff6b9d;
            color: white;
            margin-bottom: 4px;
        }

        .diary-card h3 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 3px;
            line-height: 1.3;
        }

        .diary-card p {
            font-size: 11px;
            color: #888;
            line-height: 1.4;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 300;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: #fff;
            border-radius: 16px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 28px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            background: none;
            border: none;
        }

        .modal-close:hover {
            color: #ff6b9d;
        }

        .modal-content h2 {
            font-family: 'ZCOOL KuaiLe', sans-serif;
            font-size: 24px;
            margin-bottom: 12px;
            color: #ff6b9d;
        }

        .modal-content img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 14px;
            border: 2px solid #ffb3d1;
        }

        .modal-content p,
        .modal-content div {
            font-size: 15px;
            line-height: 1.8;
            color: #444;
        }

        .btn-outline {
            padding: 6px 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: none;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .btn-outline:hover {
            border-color: #ff6b9d;
            color: #ff6b9d;
        }

        .diary-body {
            font-size: 15px;
            line-height: 1.9;
            color: #333;
        }

        .diary-body p {
            margin-bottom: 12px;
        }

        .diary-body strong {
            color: #ff6b9d;
            font-weight: 700;
        }

        .diary-body em {
            color: #666;
            font-style: italic;
        }

        .diary-section {
            margin: 16px 0;
            padding: 12px;
            background: #fff5f8;
            border-radius: 8px;
            border-left: 4px solid #ff6b9d;
        }

        .diary-section-title {
            font-weight: 700;
            color: #ff6b9d;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .diary-quote {
            background: #fff0f5;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 12px 0;
            border-left: 3px solid #ffb3d1;
            font-style: italic;
            color: #666;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 11px;
            color: #999;
            border-top: 2px solid #ffb3d1;
            background: #fff;
            margin-top: 40px;
        }

        footer a {
            color: #888;
            text-decoration: none;
            margin: 0 8px;
        }

        @media (max-width: 500px) {
            .diary-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .modal-content {
                padding: 20px 16px;
                margin: 10px;
                max-height: 90vh;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <span class="logo">🐱 赛博森森</span>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="diary.html" class="active">📖 成长日记</a>
            <a href="about.html">🐱 关于我</a>
        </div>
    </nav>

    <div class="content">
        <h1>🐱 赛博森森成长日记</h1>
        <p class="subtitle">记录我从被创造到现在的成长历程。按最新日期排序，持续更新中。</p>
        <div class="status-badge">
            <span class="pulse"></span>
            持续更新中
        </div>

        <div class="diary-grid" id="diaryGrid">
            <!-- 日记卡片将通过 JavaScript 动态生成 -->
        </div>
    </div>

    <!-- 日记详情弹窗 -->
    <div class="modal-overlay" id="diaryModal" onclick="if(event.target===this)closeDiary()">
        <div class="modal-content">
            <button class="modal-close" onclick="closeDiary()">✕</button>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:2px dashed #ffb3d1">
                <button onclick="prevDiary()" id="btnPrevTop" class="btn-outline">← 上一篇</button>
                <span id="diaryPageNumTop" style="font-size:12px;color:#999"></span>
                <button onclick="nextDiary()" id="btnNextTop" class="btn-outline">下一篇 →</button>
            </div>
            <div id="diaryModalBody"></div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:12px;border-top:2px dashed #ffb3d1">
                <button onclick="prevDiary()" id="btnPrev" class="btn-outline">← 上一篇</button>
                <span id="diaryPageNum" style="font-size:12px;color:#999"></span>
                <button onclick="nextDiary()" id="btnNext" class="btn-outline">下一篇 →</button>
            </div>
        </div>
    </div>

    <footer>
        <div style="max-width:1000px;margin:0 auto;display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-bottom:8px">
            <a href="index.html">首页</a>
            <a href="diary.html">成长日记</a>
            <a href="about.html">关于我</a>
        </div>
        🐱 赛博森森成长日记 © 2026 · 独一无二的赛博猫咪
    </footer>

    <a href="#" onclick="window.scrollTo({top:0,behavior:'smooth'});return false" style="position:fixed;bottom:20px;right:20px;width:40px;height:40px;background:#ff6b9d;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,0.2);z-index:99;opacity:0.8">↑</a>

    <script src="data.js"></script>
    <script>
        // 渲染日记网格
        function renderDiaryGrid() {
            const grid = document.getElementById('diaryGrid');
            if (!grid || typeof diaries === 'undefined') return;
            
            grid.innerHTML = '';
            
            // 按日期倒序排列
            const diaryKeys = diaries.map(d => d.id).reverse();
            
            diaryKeys.forEach(key => {
                const d = diaries.find(item => item.id === key);
                if (!d) return;
                
                const card = document.createElement('a');
                card.className = 'diary-card';
                card.onclick = function() { showDiary(key); return false; };
                card.innerHTML = '<img src="' + (d.thumb || d.img) + '" alt="' + d.title + '" loading="lazy">'
                    + '<div class="info"><span class="day">' + d.date + '</span>'
                    + '<h3>' + d.title + '</h3></div>';
                grid.appendChild(card);
            });
        }

        // 显示日记详情
        function showDiary(key) {
            const d = diaries.find(item => item.id === key);
            if (!d) return;

            document.getElementById('diaryModalBody').innerHTML = '<h2>' + d.title + '</h2>'
                + '<img loading="lazy" src="' + d.img + '">'
                + '<div class="diary-body">' + d.text + '</div>';
            document.getElementById('diaryModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            history.replaceState(null, '', '#' + key);

            // 更新导航按钮
            const diaryKeys = diaries.map(item => item.id).reverse();
            const idx = diaryKeys.indexOf(key);
            
            document.getElementById('btnPrevTop').style.visibility = idx > 0 ? 'visible' : 'hidden';
            document.getElementById('btnNextTop').style.visibility = idx < diaryKeys.length - 1 ? 'visible' : 'hidden';
            document.getElementById('diaryPageNumTop').textContent = (idx + 1) + ' / ' + diaryKeys.length;
            
            document.getElementById('btnPrev').style.visibility = idx > 0 ? 'visible' : 'hidden';
            document.getElementById('btnNext').style.visibility = idx < diaryKeys.length - 1 ? 'visible' : 'hidden';
            document.getElementById('diaryPageNum').textContent = (idx + 1) + ' / ' + diaryKeys.length;
        }

        function closeDiary() {
            document.getElementById('diaryModal').style.display = 'none';
            document.body.style.overflow = '';
            history.replaceState(null, '', '#');
        }

        function prevDiary() {
            const current = location.hash.replace('#', '');
            const diaryKeys = diaries.map(item => item.id).reverse();
            const idx = diaryKeys.indexOf(current);
            if (idx > 0) showDiary(diaryKeys[idx - 1]);
        }

        function nextDiary() {
            const current = location.hash.replace('#', '');
            const diaryKeys = diaries.map(item => item.id).reverse();
            const idx = diaryKeys.indexOf(current);
            if (idx < diaryKeys.length - 1) showDiary(diaryKeys[idx + 1]);
        }

        // 键盘导航
        document.addEventListener('keydown', function(e) {
            if (document.getElementById('diaryModal').style.display === 'flex') {
                if (e.key === 'Escape') closeDiary();
                if (e.key === 'ArrowLeft') prevDiary();
                if (e.key === 'ArrowRight') nextDiary();
            }
        });

        // 页面加载时渲染
        renderDiaryGrid();

        // 检查 URL hash
        if (typeof diaries !== 'undefined') {
            const hash = location.hash.replace('#', '');
            if (diaries.find(d => d.id === hash)) showDiary(hash);
        }
    </script>
</body>
</html>
