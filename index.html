<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博森森 - 点击探索</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }
        
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: pointer;
        }
        
        /* 内容面板 */
        .content-panel {
            position: fixed;
            right: 0;
            top: 0;
            width: 45%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            border-left: 1px solid rgba(0,255,136,0.2);
            z-index: 20;
            overflow-y: auto;
            padding: 60px 50px;
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .content-panel.active {
            opacity: 1;
            transform: translateX(0);
        }
        
        .panel-close {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            background: transparent;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .panel-close:hover {
            border-color: #00ff88;
            color: #00ff88;
        }
        
        .panel-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .panel-subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 30px;
        }
        
        .panel-content {
            font-size: 15px;
            line-height: 2;
            color: rgba(255,255,255,0.85);
            margin-bottom: 30px;
        }
        
        /* 案例列表 */
        .case-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .case-item {
            background: rgba(0,255,136,0.03);
            border: 1px solid rgba(0,255,136,0.15);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .case-item:hover {
            border-color: #00ff88;
            transform: translateX(5px);
        }
        
        .case-item.expanded {
            background: rgba(0,255,136,0.08);
        }
        
        .case-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .case-brief {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            line-height: 1.6;
        }
        
        .case-detail {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(0,255,136,0.2);
        }
        
        .case-item.expanded .case-detail {
            display: block;
        }
        
        .screenshot {
            width: 100%;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .case-thought {
            background: rgba(138,43,226,0.1);
            border-left: 4px solid #8a2be2;
            padding: 15px 20px;
            font-size: 14px;
            line-height: 1.8;
            color: rgba(255,255,255,0.9);
            margin: 15px 0;
        }
        
        .case-thought strong {
            color: #8a2be2;
        }
        
        .case-link {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(0,255,136,0.1);
            border: 1px solid #00ff88;
            border-radius: 20px;
            color: #00ff88;
            text-decoration: none;
            font-size: 13px;
            transition: all 0.3s;
            margin-top: 15px;
        }
        
        .case-link:hover {
            background: rgba(0,255,136,0.2);
        }
        
        /* 提示 */
        .hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 1px;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }
        
        /* 部位标签 */
        .part-label {
            position: fixed;
            padding: 8px 16px;
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(0,255,136,0.3);
            border-radius: 20px;
            font-size: 11px;
            color: #00ff88;
            pointer-events: none;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .part-label.visible {
            opacity: 1;
        }
    </style>
</head>

        let currentPart = null;
        let time = 0;
        
        // 绘制函数
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.fillRect(0, 0, width, height);
            
            time += 0.01;
            
            // 平滑旋转和缩放
            rotationY += (targetRotationY - rotationY) * 0.05;
            scale += (targetScale - scale) * 0.05;
            
            const centerX = width * 0.35;
            const centerY = height * 0.5;
            const baseSize = Math.min(width, height) * 0.35 * scale;
            
            // 呼吸效果
            const breathe = 1 + Math.sin(time * 1.5) * 0.02;
            
            // 绘制猫咪
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(rotationY * 0.1);
            ctx.scale(breathe, breathe);
            
            // 身体 - 椭圆坐姿
            ctx.beginPath();
            ctx.ellipse(0, 60, baseSize * 0.45, baseSize * 0.35, 0, 0, Math.PI * 2);
            const bodyGrad = ctx.createRadialGradient(0, 60, 0, 0, 60, baseSize * 0.45);
            bodyGrad.addColorStop(0, 'rgba(0,255,136,0.3)');
            bodyGrad.addColorStop(1, 'rgba(138,43,226,0.2)');
            ctx.fillStyle = bodyGrad;
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,255,136,0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 头部 - 圆形
            ctx.beginPath();
            ctx.arc(0, -40, baseSize * 0.35, 0, Math.PI * 2);
            const headGrad = ctx.createRadialGradient(0, -40, 0, 0, -40, baseSize * 0.35);
            headGrad.addColorStop(0, 'rgba(0,255,136,0.35)');
            headGrad.addColorStop(1, 'rgba(0,212,255,0.25)');
            ctx.fillStyle = headGrad;
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,255,136,0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 左耳
            ctx.beginPath();
            ctx.moveTo(-baseSize * 0.2, -baseSize * 0.55);
            ctx.lineTo(-baseSize * 0.1, -baseSize * 0.8);
            ctx.lineTo(0, -baseSize * 0.55);
            ctx.closePath();
            ctx.fillStyle = 'rgba(138,43,226,0.4)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(138,43,226,0.6)';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 右耳
            ctx.beginPath();
            ctx.moveTo(baseSize * 0.2, -baseSize * 0.55);
            ctx.lineTo(baseSize * 0.1, -baseSize * 0.8);
            ctx.lineTo(0, -baseSize * 0.55);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            // 左眼 - 椭圆
            ctx.beginPath();
            ctx.ellipse(-baseSize * 0.12, -baseSize * 0.35, baseSize * 0.08, baseSize * 0.05, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,255,255,0.6)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,255,255,0.8)';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 右眼 - 椭圆
            ctx.beginPath();
            ctx.ellipse(baseSize * 0.12, -baseSize * 0.35, baseSize * 0.08, baseSize * 0.05, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            // 鼻子 - 小三角
            ctx.beginPath();
            ctx.moveTo(0, -baseSize * 0.25);
            ctx.lineTo(-baseSize * 0.03, -baseSize * 0.2);
            ctx.lineTo(baseSize * 0.03, -baseSize * 0.2);
            ctx.closePath();
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fill();
            
            // 发光效果
            ctx.shadowColor = 'rgba(0,255,136,0.3)';
            ctx.shadowBlur = 30;
            
            ctx.restore();
            
            // 检测hover
            checkHover(centerX, centerY, baseSize);
            
            requestAnimationFrame(draw);
        }
        
        function checkHover(cx, cy, size) {
            const label = document.getElementById('partLabel');
            let found = null;
            
            Object.keys(catParts).forEach(key => {
                const part = catParts[key];
                const px = cx + part.x * size / 120;
                const py = cy + part.y * size / 120;
                const dist = Math.sqrt(Math.pow(mouseX - px, 2) + Math.pow(mouseY - py, 2));
                
                if (dist < part.r * size / 120) {
                    found = part;
                }
            });
            
            if (found && found !== hoveredPart) {
                hoveredPart = found;
                label.textContent = '点击' + found.name;
                label.classList.add('visible');
                label.style.left = (mouseX + 20) + 'px';
                label.style.top = (mouseY - 30) + 'px';
            } else if (!found) {
                hoveredPart = null;
                label.classList.remove('visible');
            }
        }
        
        let mouseX = 0, mouseY = 0;
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('click', () => {
            if (hoveredPart) {
                openPage(hoveredPart.page);
            }
        });
        
        function openPage(pageId) {
            const panel = document.getElementById('contentPanel');
            const page = pages[pageId];
            
            if (!page) return;
            
            // 旋转猫咪
            targetRotationY += Math.PI / 4;
            
            // 更新内容
            document.getElementById('panelTitle').textContent = page.title;
            document.getElementById('panelSubtitle').textContent = page.subtitle;
            document.getElementById('panelContent').innerHTML = page.content;
            
            // 显示面板
            panel.classList.add('active');
        }
        
        function closePanel() {
            document.getElementById('contentPanel').classList.remove('active');
            targetRotationY -= Math.PI / 4;
        }
        
        function toggleCase(element) {
            element.classList.toggle('expanded');
        }
        
        draw();
    </script>
</body>
</html>
