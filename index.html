        let time = 0;

            ctx.rotate(rotationY * 0.1);
            ctx.scale(breathe, breathe);

            // 身体 - 流畅的曲线
            ctx.beginPath();
            ctx.moveTo(-baseSize * 0.45, baseSize * 0.9);

                -baseSize * 0.5, baseSize * 0.3,
                -baseSize * 0.5, -baseSize * 0.1,
                -baseSize * 0.3, -baseSize * 0.3
            );

            );

                baseSize * 0.5, baseSize * 0.3,
                baseSize * 0.45, baseSize * 0.9
            );
            ctx.closePath();

            bodyGrad.addColorStop(0, 'rgba(0,255,136,0.25)');
            bodyGrad.addColorStop(1, 'rgba(138,43,226,0.15)');
            ctx.fillStyle = bodyGrad;

            headGrad.addColorStop(1, 'rgba(0,212,255,0.2)');

            ctx.lineTo(-baseSize * 0.18, -baseSize * 0.95);
            ctx.lineTo(-baseSize * 0.08, -baseSize * 0.65);
            ctx.closePath();
            const earGrad = ctx.createLinearGradient(-baseSize * 0.28, -baseSize * 0.65, -baseSize * 0.18, -baseSize * 0.95);
            earGrad.addColorStop(0, 'rgba(138,43,226,0.4)');
            earGrad.addColorStop(1, 'rgba(0,212,255,0.3)');
            ctx.fillStyle = earGrad;
            ctx.fill();
            ctx.strokeStyle = 'rgba(138,43,226,0.7)';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 右耳
            ctx.beginPath();
            ctx.moveTo(baseSize * 0.28, -baseSize * 0.65);
            ctx.lineTo(baseSize * 0.18, -baseSize * 0.95);
            ctx.lineTo(baseSize * 0.08, -baseSize * 0.65);

            ctx.beginPath();
            ctx.arc(-baseSize * 0.17, -baseSize * 0.47, baseSize * 0.02, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.fill();
            
            // 右眼
            ctx.beginPath();
            ctx.ellipse(baseSize * 0.15, -baseSize * 0.45, baseSize * 0.09, baseSize * 0.06, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,255,255,0.7)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,255,255,0.9)';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(baseSize * 0.13, -baseSize * 0.47, baseSize * 0.02, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.fill();
            
            // 鼻子 - 小三角
            ctx.beginPath();
            ctx.moveTo(0, -baseSize * 0.32);
            ctx.lineTo(-baseSize * 0.04, -baseSize * 0.26);
            ctx.lineTo(baseSize * 0.04, -baseSize * 0.26);
            ctx.closePath();
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.fill();
            
            // 嘴巴 - 曲线
            ctx.beginPath();
            ctx.moveTo(0, -baseSize * 0.26);
            ctx.lineTo(-baseSize * 0.06, -baseSize * 0.2);
            ctx.moveTo(0, -baseSize * 0.26);
            ctx.lineTo(baseSize * 0.06, -baseSize * 0.2);
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            
            // 胡须
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1;
            
            // 左侧胡须
            ctx.beginPath();
            ctx.moveTo(-baseSize * 0.15, -baseSize * 0.28);
            ctx.lineTo(-baseSize * 0.35, -baseSize * 0.32);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(-baseSize * 0.15, -baseSize * 0.25);
            ctx.lineTo(-baseSize * 0.35, -baseSize * 0.25);
            ctx.stroke();
            
            // 右侧胡须
            ctx.beginPath();
            ctx.moveTo(baseSize * 0.15, -baseSize * 0.28);
            ctx.lineTo(baseSize * 0.35, -baseSize * 0.32);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(baseSize * 0.15, -baseSize * 0.25);
            ctx.lineTo(baseSize * 0.35, -baseSize * 0.25);
            ctx.stroke();
            
            ctx.restore();
            
            // 检测hover
            checkHover(centerX, centerY, baseSize);
            
            requestAnimationFrame(draw);
        }
        
        function checkHover(cx, cy, size) {
            const label = document.getElementById('partLabel');
            let found = null;
            
            Object.keys(catParts).forEach(key => {
                const part = catParts[key];
                const px = cx + part.x * size / 100;
                const py = cy + part.y * size / 100;
                const dist = Math.sqrt(Math.pow(mouseX - px, 2) + Math.pow(mouseY - py, 2));
                
                if (dist < part.r * size / 100) {
                    found = part;
                }
            });
            
            if (found && found !== hoveredPart) {
                hoveredPart = found;
                label.textContent = '点击' + found.name;
                label.classList.add('visible');
                label.style.left = (mouseX + 20) + 'px';
                label.style.top = (mouseY - 30) + 'px';
            } else if (!found) {
                hoveredPart = null;
                label.classList.remove('visible');
            }
        }
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('click', () => {
            if (hoveredPart) {
                openPage(hoveredPart.page);
            }
        });
        
        function openPage(pageId) {
            const panel = document.getElementById('contentPanel');
            const page = pages[pageId];
            
            if (!page) return;
            
            targetRotationY += Math.PI / 4;
            
            document.getElementById('panelTitle').textContent = page.title;
            document.getElementById('panelSubtitle').textContent = page.subtitle;
            document.getElementById('panelContent').innerHTML = page.content;
            
            panel.classList.add('active');
        }
        
        function closePanel() {
            document.getElementById('contentPanel').classList.remove('active');
            targetRotationY -= Math.PI / 4;
        }
        
        function toggleCase(element) {
            element.classList.toggle('expanded');
        }
        
        draw();
    </script>
</body>
</html>
